backend:
  name: github
  repo: Tanjib-Ahmed/AlokitoPoribeshFoundation
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "content/pages/about.md"
        label: "About Us"
        name: "about"
        fields:
          - { label: "Title Bangla", name: "titleBn", widget: "string" }
          - { label: "Title English", name: "titleEn", widget: "string" }
          - { label: "Description Bangla", name: "descriptionBn", widget: "text" }
          - { label: "Description English", name: "descriptionEn", widget: "text" }
          - { label: "Mission Bangla", name: "missionBn", widget: "text" }
          - { label: "Mission English", name: "missionEn", widget: "text" }
          - { label: "Vision Bangla", name: "visionBn", widget: "text" }
          - { label: "Vision English", name: "visionEn", widget: "text" }

  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Cover Image", name: "cover", widget: "image" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery"
    folder: "content/gallery"
    create: true
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption Bangla", name: "captionBn", widget: "string" }
      - { label: "Caption English", name: "captionEn", widget: "string" }

  - name: "settings"
    label: "Settings"
    files:
      - file: "content/settings.json"
        label: "General Settings"
        name: "general"
        fields:
          - { label: "Foundation Name Bangla", name: "nameBn", widget: "string" }
          - { label: "Foundation Name English", name: "nameEn", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Facebook Page URL", name: "facebookUrl", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
